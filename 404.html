<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>404 · 页面不存在</title>
  <style>
    :root {
      --bg0: #08101d;
      --bg1: #12233f;
      --text: #e8f3ff;
      --muted: #9db7cc;
      --accent: #2bd8c4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--text);
      font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 15% 10%, rgba(43, 216, 196, 0.18), transparent 34%),
        radial-gradient(circle at 90% 90%, rgba(126, 168, 255, 0.2), transparent 30%),
        linear-gradient(155deg, var(--bg0), var(--bg1));
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      border-radius: 20px;
      border: 1px solid rgba(127, 172, 212, 0.3);
      background: rgba(10, 21, 38, 0.72);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      padding: 30px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 2.2rem;
    }
    p {
      margin: 0;
      line-height: 1.7;
      color: var(--muted);
    }
    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: #08213a;
      background: linear-gradient(120deg, var(--accent), #8ad9ff);
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>404</h1>
    <p>你访问的页面不存在或链接已失效。</p>
    <p>请返回星智行首页继续查看智慧路况交互平台。</p>
    <a href="/">返回首页</a>
  </main>
</body>
</html>
